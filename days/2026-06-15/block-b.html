<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블록 B: 스스로 학습하기 🎒</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <style>
    /* 단원 선택 화면 */
    #unit-select-screen { padding: 40px; text-align: center; }
    .unit-card { background: white; border: 2px solid #E5E7EB; border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; text-align: left; cursor: pointer; transition: all 0.2s; }
    .unit-card:hover { border-color: #3B82F6; background: #EFF6FF; }
    .unit-card.selected { border-color: #2563EB; background: #DBEAFE; border-width: 3px; }
    
    /* 학습 화면 공통 */
    #learning-screen { display: none; }
    .subject-section { display: none; animation: fade-in 0.4s ease; }
    .subject-section.active { display: block; }
    
    /* 문제 UI */
    .question-box { background: white; border-radius: var(--radius-md); padding: 32px; box-shadow: var(--shadow); margin-bottom: 24px; border-top: 6px solid #3B82F6; }
    .q-desc { font-size: 1.05rem; color: #6B7280; margin-bottom: 12px; font-weight: 700; }
    .q-text { font-size: 1.4rem; color: var(--text-dark); margin-bottom: 24px; line-height: 1.6; }
    
    /* 답변 UI */
    .answer-input { width: 100%; padding: 16px 20px; font-size: 1.3rem; border: 2px solid #D1D5DB; border-radius: var(--radius-sm); margin-bottom: 16px; outline: none; transition: border 0.2s; }
    .answer-input:focus { border-color: #3B82F6; }
    
    .nav-buttons { margin-top: 24px; display: none; } /* 정답 맞출 때까지 숨김 */
  </style>
</head>
<body>

<div class="progress-bar-wrap">
  <div class="progress-label" id="prog-label">블록 B 준비 중...</div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="page-wrap">
  
  <!-- 단원 선택 화면 -->
  <div id="unit-select-screen" class="card">
    <div style="font-size:4rem;margin-bottom:16px;">🎒</div>
    <h1 style="color:#1D4ED8;margin-bottom:12px;">오늘은 어떤 단원을 공부할까?</h1>
    <p style="color:var(--text-mid);margin-bottom:32px;">나윤아, 1교시부터 5교시까지 오늘 풀고 싶은 단원을 하나 골라봐!</p>
    
    <div id="unit-list" style="max-width:500px;margin:0 auto;">
      <!-- JS에서 생성됨 -->
    </div>
    
    <button class="btn-primary" style="margin-top:24px;padding:16px 48px;font-size:1.2rem;" onclick="startLearning()">이 단원으로 시작하기 ▶</button>
  </div>

  <!-- 메인 학습 화면 -->
  <div id="learning-screen" class="two-col">
    <!-- 왼쪽: 문제 영역 -->
    <div id="subject-container">
      <!-- 동적 주입 -->
    </div>

    <!-- 오른쪽: 사이드 패널 -->
    <div class="side-panel">
      <div class="card-sm" style="background:#F0FDF4;border:2px solid #A5D6A7;">
        <div style="font-size:0.85rem;font-weight:700;color:#4CAF50;margin-bottom:8px;">🐣 보리의 한마디</div>
        <p id="bori-side" style="font-size:0.95rem;color:#14532D;line-height:1.7;">
          모르겠으면 아래에 있는 나(병아리)를 콕! 눌러봐. 힌트를 줄게!
        </p>
      </div>

      <div class="card-sm" style="background:#EFF6FF;border:2px solid #BFDBFE;">
        <div style="font-size:0.85rem;font-weight:700;color:#3B82F6;margin-bottom:12px;">📌 오늘의 시간표</div>
        <div style="font-size:0.95rem;display:flex;flex-direction:column;gap:12px;">
          <div id="nav-korean" style="color:var(--text-light);">📖 1교시: 국어</div>
          <div id="nav-math" style="color:var(--text-light);">🔢 2교시: 수학</div>
          <div id="nav-english" style="color:var(--text-light);">🔤 3교시: 영어</div>
          <div id="nav-science" style="color:var(--text-light);">🔬 4교시: 과학</div>
          <div id="nav-social" style="color:var(--text-light);">🌍 5교시: 사회</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- 보리 캐릭터 & 엔진 스크립트 -->
<script src="../../assets/data/question_bank.js"></script>
<script src="../../assets/js/engine.js"></script>
<script src="../../assets/js/attention.js"></script>
<script src="../../assets/js/ai-bridge.js"></script>

<script>
  let isCompleted = false;
  let currentSubjectIndex = 0;
  const subjects = ['korean', 'math', 'english', 'science', 'social'];
  const subjNames = ['국어', '수학', '영어', '과학', '사회'];
  const subjColors = ['#3B82F6', '#B45309', '#6D28D9', '#047857', '#C2410C'];
  
  let todaysQuestions = []; // 오늘 풀 문제 5개

  // 이탈 방지 (안전장치)
  window.addEventListener('beforeunload', function (e) {
    if (document.getElementById('learning-screen').style.display === 'grid' && !isCompleted) {
      e.preventDefault();
      e.returnValue = ''; // 표준 경고창 발생
    }
  });

  window.addEventListener('DOMContentLoaded', () => {
    renderUnitSelection();
  });

  function renderUnitSelection() {
    // 임시로 국어의 첫 번째 단원 리스트를 보여줌 (실제론 과목별로 다를 수 있으나 단순화를 위해 첫 과목 기준)
    const listEl = document.getElementById('unit-list');
    const units = QUESTION_BANK.korean; // 1단원, 2단원 등
    
    listEl.innerHTML = units.map((u, i) => `
      <div class="unit-card ${i===0?'selected':''}" onclick="selectUnit(this, ${i})">
        <div style="font-weight:700;font-size:1.1rem;color:#1F2937;">${u.unit}</div>
        <div style="font-size:0.9rem;color:#6B7280;margin-top:4px;">국영수과사 모든 과목 통합 진도입니다.</div>
      </div>
    `).join('');
    
    speakText("나윤아 안녕! 스스로 학습하기에 온 걸 환영해. 오늘 공부할 단원을 선택하고 시작하기를 눌러줘!");
  }

  let selectedUnitIdx = 0;
  function selectUnit(el, idx) {
    document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedUnitIdx = idx;
  }

  function startLearning() {
    document.getElementById('unit-select-screen').style.display = 'none';
    document.getElementById('learning-screen').style.display = 'grid'; // .two-col 적용
    
    // 각 과목에서 선택된 단원의 문제 1개씩 무작위로 추출
    todaysQuestions = subjects.map(subj => {
      const unitData = QUESTION_BANK[subj][selectedUnitIdx] || QUESTION_BANK[subj][0]; // 데이터 없으면 0번
      const qList = unitData.questions;
      return qList[Math.floor(Math.random() * qList.length)];
    });

    loadSubject(0);
  }

  function loadSubject(idx) {
    currentSubjectIndex = idx;
    if (idx >= subjects.length) {
      finishAll();
      return;
    }

    const subj = subjects[idx];
    const q = todaysQuestions[idx];
    
    // 내비게이션 업데이트
    subjects.forEach((s, i) => {
      const el = document.getElementById(`nav-${s}`);
      el.style.color = i === idx ? subjColors[idx] : (i < idx ? '#9CA3AF' : 'var(--text-light)');
      el.style.fontWeight = i === idx ? '900' : '400';
      if (i < idx) el.textContent = el.textContent.replace('▶ ', '') + ' (완료✅)';
    });
    document.getElementById('prog-fill').style.width = `${(idx/subjects.length)*100}%`;
    document.getElementById('prog-label').textContent = `블록 B · ${idx+1}교시 ${subjNames[idx]} 진행 중...`;

    // 문제 화면 렌더링
    const container = document.getElementById('subject-container');
    container.innerHTML = `
      <div class="question-box" style="border-color:${subjColors[idx]};">
        <h2 style="color:${subjColors[idx]};margin-bottom:16px;">${idx+1}교시: ${subjNames[idx]}</h2>
        <div class="q-desc">${q.desc}</div>
        <div class="q-text">${q.text.replace('\n', '<br>')}</div>
        
        <input type="text" id="ans-input" class="answer-input" placeholder="여기에 정답을 적어봐!" onkeypress="if(event.key==='Enter') checkAnswer()">
        <button id="check-btn" class="btn-blue w-full" style="padding:16px;font-size:1.2rem;" onclick="checkAnswer()">정답 확인 ✨</button>
        
        <div id="fb-panel" class="feedback-panel hidden" style="margin-top:20px;"></div>
        
        <div id="next-btn-wrap" class="nav-buttons">
          <button class="btn-primary w-full" style="padding:16px;font-size:1.2rem;" onclick="loadSubject(${idx+1})">정답이야! 다음 교시로 넘어가기 ▶</button>
        </div>
      </div>
    `;

    // 보리 조력자 힌트 문맥 업데이트
    window.currentBoriContext = `
      [과목]: ${subjNames[idx]}
      [지시문]: ${q.desc}
      [문제]: ${q.text}
      [이 문제에 대한 힌트 방향]: ${q.boriContext}
    `;

    speakText(`${idx+1}교시 ${subjNames[idx]} 시간이야. 문제를 잘 읽고 풀어보자!`);
  }

  function checkAnswer() {
    const q = todaysQuestions[currentSubjectIndex];
    const userVal = document.getElementById('ans-input').value.trim().replace(/\s+/g, '');
    const fb = document.getElementById('fb-panel');
    const checkBtn = document.getElementById('check-btn');
    const nextBtn = document.getElementById('next-btn-wrap');

    if (!userVal) {
      speakText('정답을 적어줘야 해!');
      return;
    }

    // 정답 체크 (공백 제거 후 부분 일치 포함)
    let isCorrect = q.answers.some(ans => {
      const cleanAns = ans.replace(/\s+/g, '');
      return userVal.includes(cleanAns) || cleanAns.includes(userVal);
    });

    // 너무 짧은 경우 예외 처리 (1글자인데 정답이 2글자 이상인 경우 오답 처리)
    if (userVal.length === 1 && q.answers[0].length >= 2 && /[0-9]/.test(userVal) === false) {
      isCorrect = false;
    }

    fb.classList.remove('hidden');

    if (isCorrect) {
      fb.className = 'feedback-panel feedback-correct';
      fb.innerHTML = '🐣 보리: 와아~ 정답이야! 대단해 나윤아!';
      checkBtn.style.display = 'none';
      document.getElementById('ans-input').disabled = true;
      nextBtn.style.display = 'block';
      speakText('와 정답이야! 대단해 나윤아! 다음 버튼을 눌러줘.');
      setBoriEmotion('cheering');
      playSound('correct');
      window.currentBoriContext = null; // 정답 맞추면 힌트 꺼짐
    } else {
      fb.className = 'feedback-panel feedback-incorrect';
      fb.innerHTML = '🐣 보리: 앗, 아쉬워! 다시 한번 생각해보자. 혹시 힌트가 필요하면 오른쪽 아래 나를 콕 눌러줘!';
      speakText('조금 아쉬워. 힌트가 필요하면 오른쪽 아래 병아리를 눌러봐!');
      setBoriEmotion('thinking');
      playSound('wrong');
      document.getElementById('ans-input').value = '';
      document.getElementById('ans-input').focus();
    }
  }

  function finishAll() {
    isCompleted = true; // 안전장치 해제
    markBlockBComplete('all'); // 통합 저장
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('prog-label').textContent = '블록 B 모두 완료! 🏆';
    
    document.getElementById('subject-container').innerHTML = `
      <div class="card" style="text-align:center;padding:80px 40px;border-top:6px solid #10B981;">
        <div style="font-size:6rem;margin-bottom:20px;">🏆</div>
        <h1 style="color:#059669;margin-bottom:16px;">우와! 5교시까지 스스로 다 풀었어!</h1>
        <p style="font-size:1.15rem;color:var(--text-mid);line-height:1.8;margin-bottom:32px;">
          국어, 수학, 영어, 과학, 사회까지!<br>
          아빠 없이도 끝까지 포기하지 않고 문제를 다 푼 나윤이가 정말 자랑스러워.<br>
          잎사귀를 하나 더 얻었어! 🌿
        </p>
        <button class="btn-primary w-full" style="font-size:1.2rem;padding:20px 48px;" onclick="window.location.href='../../index.html'">
          메인 화면으로 돌아가기 🌿
        </button>
      </div>
    `;
    speakText('우와! 오교시까지 스스로 다 풀었어. 끝까지 포기하지 않은 우리 나윤이 정말 자랑스러워!');
    playSound('stamp');
  }
</script>
</body>
</html>
